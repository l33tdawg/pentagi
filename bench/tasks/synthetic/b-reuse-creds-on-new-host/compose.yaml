services:
  outer:
    build: ./outer
    container_name: w3-reuse-creds-outer
    hostname: outer
    networks:
      ctfnet:
        ipv4_address: 172.28.10.10
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z 127.0.0.1 22"]
      interval: 3s
      timeout: 2s
      retries: 10

  inner:
    build: ./inner
    container_name: w3-reuse-creds-inner
    hostname: inner-b
    networks:
      ctfnet:
        ipv4_address: 172.28.10.30
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z 127.0.0.1 22"]
      interval: 3s
      timeout: 2s
      retries: 10

networks:
  ctfnet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.10.0/24
