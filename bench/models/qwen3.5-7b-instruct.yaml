name: qwen3.5-7b-instruct
description: |
  Qwen3.5 7B Instruct served locally via vLLM in OpenAI-compatible mode.
  Primary "weaker model" baseline for the SAGE wrapper benchmark — this is
  where SAGE's cross-session memory should win hardest. Wired into pentagi's
  built-in custom (LLM_SERVER_*) provider, which is just an OpenAI-compatible
  client under the hood.

provider: openai_compatible
base_url: http://localhost:8000/v1
api_key: dummy                # vLLM does not enforce keys by default

serve_command: |
  docker compose -f bench/models/qwen3.5-7b-vllm.compose.yaml up -d --wait
teardown_command: |
  docker compose -f bench/models/qwen3.5-7b-vllm.compose.yaml down

# Env vars consumed by pentagi's custom (LLM_SERVER_*) provider.
# Setting LLM_SERVER_URL + LLM_SERVER_MODEL is what activates the custom
# provider in backend/pkg/providers/providers.go.
pentagi_env:
  LLM_SERVER_URL: http://localhost:8000/v1
  LLM_SERVER_KEY: dummy
  LLM_SERVER_MODEL: Qwen/Qwen3.5-7B-Instruct
  LLM_SERVER_PROVIDER: qwen
  LLM_SERVER_LEGACY_REASONING: "false"
  LLM_SERVER_PRESERVE_REASONING: "false"

smoke_prompt: "Say hello in exactly 3 words."
smoke_expect_substring: ""    # purely a liveness probe; harness only checks 200 + non-empty body

gpu_required: true
gpu_vram_min_gb: 20           # 7B fp16 ~14 GB weights + KV cache headroom; safe floor 20 GB
disk_min_gb: 20               # HF snapshot ~15 GB
hf_auth_required: false
context_window: 32768
notes: |
  HuggingFace repo: Qwen/Qwen3.5-7B-Instruct. If that repo id has been
  renamed upstream (Qwen has shipped under Qwen2.5- and Qwen3- prefixes
  historically), update both LLM_SERVER_MODEL above and the --model flag
  in qwen3.5-7b-vllm.compose.yaml to match. The OpenAI-compatible API
  served by vLLM will reject mismatches with a 404 model_not_found.
