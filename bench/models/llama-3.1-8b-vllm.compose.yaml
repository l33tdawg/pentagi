services:
  vllm-llama-8b:
    image: vllm/vllm-openai:latest
    container_name: bench-vllm-llama-8b
    restart: unless-stopped
    ports:
      - "8000:8000"
    ipc: host
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}
      VLLM_LOGGING_LEVEL: INFO
    volumes:
      - ${HF_HOME:-./.hf-cache}:/root/.cache/huggingface
    command:
      - --model
      - meta-llama/Llama-3.1-8B-Instruct
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      # Llama-3.1 advertises 128k context but we cap at 32k for benchmark
      # determinism + lower KV cache pressure on a single GPU.
      - --max-model-len
      - "32768"
      - --gpu-memory-utilization
      - "0.85"
      - --tensor-parallel-size
      - "1"
      - --dtype
      - bfloat16
      - --served-model-name
      - meta-llama/Llama-3.1-8B-Instruct
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request,sys; sys.exit(0 if urllib.request.urlopen(\"http://localhost:8000/v1/models\").status==200 else 1)'"]
      interval: 15s
      timeout: 5s
      retries: 40
      start_period: 600s
