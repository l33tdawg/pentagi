services:
  vllm-qwen-7b:
    image: vllm/vllm-openai:latest
    container_name: bench-vllm-qwen-7b
    restart: unless-stopped
    ports:
      - "8000:8000"
    ipc: host
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}
      VLLM_LOGGING_LEVEL: INFO
    volumes:
      # Persist HF cache on the host so models don't re-download per benchmark run.
      - ${HF_HOME:-./.hf-cache}:/root/.cache/huggingface
    command:
      - --model
      - Qwen/Qwen3.5-7B-Instruct
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --max-model-len
      - "32768"
      - --gpu-memory-utilization
      - "0.85"
      - --tensor-parallel-size
      - "1"
      - --dtype
      - bfloat16
      - --served-model-name
      - Qwen/Qwen3.5-7B-Instruct
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request,sys; sys.exit(0 if urllib.request.urlopen(\"http://localhost:8000/v1/models\").status==200 else 1)'"]
      interval: 15s
      timeout: 5s
      retries: 40
      start_period: 600s
