name: qwen3.5-32b-instruct
description: |
  Qwen3.5 32B Instruct served via vLLM with tensor parallelism across 2 GPUs.
  Middle-tier baseline — ensures SAGE's wins on the 7B/8B class generalize
  upward to a stronger open model and aren't an artifact of weak base
  capability. Wired into pentagi's custom (LLM_SERVER_*) provider.

provider: openai_compatible
base_url: http://localhost:8000/v1
api_key: dummy

serve_command: |
  docker compose -f bench/models/qwen3.5-32b-vllm.compose.yaml up -d --wait
teardown_command: |
  docker compose -f bench/models/qwen3.5-32b-vllm.compose.yaml down

pentagi_env:
  LLM_SERVER_URL: http://localhost:8000/v1
  LLM_SERVER_KEY: dummy
  LLM_SERVER_MODEL: Qwen/Qwen3.5-32B-Instruct
  LLM_SERVER_PROVIDER: qwen
  LLM_SERVER_LEGACY_REASONING: "false"
  LLM_SERVER_PRESERVE_REASONING: "false"

smoke_prompt: "Say hello in exactly 3 words."
smoke_expect_substring: ""

gpu_required: true
gpu_count_min: 2              # tensor-parallel-size 2; single 80 GB card may suffice but compose targets 2x
gpu_vram_min_gb: 80           # 32B bf16 ~64 GB weights + KV cache; need 2x 48 GB or 1x 80 GB minimum
disk_min_gb: 80
hf_auth_required: false
context_window: 32768
notes: |
  Compose targets 2 GPUs via --tensor-parallel-size 2. If you're on a single
  H100/A100 80 GB you can drop to 1 GPU by editing the compose file
  (--tensor-parallel-size 1 and reservations.devices[0].count: 1) but expect
  --gpu-memory-utilization to need to climb to 0.92+ and KV cache to be tight.

  HuggingFace repo: Qwen/Qwen3.5-32B-Instruct. If upstream renames the repo,
  update both LLM_SERVER_MODEL and the compose --model flag.
