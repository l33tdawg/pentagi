name: llama-3.1-8b-instruct
description: |
  Meta Llama-3.1 8B Instruct served locally via vLLM. Second weak baseline,
  different model family from Qwen — gives the SAGE benchmark a sanity check
  that gains aren't Qwen-specific. Wired into pentagi's built-in custom
  (LLM_SERVER_*) provider over an OpenAI-compatible endpoint.

provider: openai_compatible
base_url: http://localhost:8000/v1
api_key: dummy

serve_command: |
  docker compose -f bench/models/llama-3.1-8b-vllm.compose.yaml up -d --wait
teardown_command: |
  docker compose -f bench/models/llama-3.1-8b-vllm.compose.yaml down

pentagi_env:
  LLM_SERVER_URL: http://localhost:8000/v1
  LLM_SERVER_KEY: dummy
  LLM_SERVER_MODEL: meta-llama/Llama-3.1-8B-Instruct
  LLM_SERVER_PROVIDER: meta
  LLM_SERVER_LEGACY_REASONING: "false"
  LLM_SERVER_PRESERVE_REASONING: "false"

smoke_prompt: "Say hello in exactly 3 words."
smoke_expect_substring: ""

gpu_required: true
gpu_vram_min_gb: 24           # 8B fp16 ~16 GB weights + KV cache headroom; safe floor 24 GB
disk_min_gb: 20
hf_auth_required: true        # Llama-3.1 is a gated repo on HuggingFace
context_window: 131072
notes: |
  Llama-3.1 is a GATED HuggingFace repo. Before running the serve command,
  export HF_TOKEN (a token with access to meta-llama/Llama-3.1-8B-Instruct):

    export HF_TOKEN=hf_xxx
    ./bench/models/serve.sh llama-3.1-8b-instruct

  The token gets passed into the vLLM container via HUGGING_FACE_HUB_TOKEN.
  Without it, vLLM will fail with a 401 on first model pull.
